services:
  gateway:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8787"
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL}
      UPSTREAM_RESPONSES_PATH: ${UPSTREAM_RESPONSES_PATH:-/responses}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY}
      UPSTREAM_API_KEYS: ${UPSTREAM_API_KEYS:-}
      UPSTREAM_ENDPOINTS_JSON: ${UPSTREAM_ENDPOINTS_JSON:-}
      GATEWAY_KEY_HASHES: ${GATEWAY_KEY_HASHES}
      REQUESTS_PER_MINUTE: ${REQUESTS_PER_MINUTE:-30}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-2}
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-300000}
      DATABASE_URL: postgresql://connector:${POSTGRES_PASSWORD:-connector-dev-only}@postgres:5432/connector
      REDIS_URL: redis://redis:6379
      SELF_SERVICE_ENABLED: ${SELF_SERVICE_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_AUTH_CODE: ${SMTP_AUTH_CODE:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SELF_SERVICE_DAILY_LIMIT: ${SELF_SERVICE_DAILY_LIMIT:-100}
      SELF_SERVICE_REQUESTS_PER_MINUTE: ${SELF_SERVICE_REQUESTS_PER_MINUTE:-30}
      SELF_SERVICE_MAX_CONCURRENT: ${SELF_SERVICE_MAX_CONCURRENT:-2}
      SELF_SERVICE_KEY_EXPIRES_DAYS: ${SELF_SERVICE_KEY_EXPIRES_DAYS:-30}
    ports:
      - "127.0.0.1:8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8787/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: connector
      POSTGRES_USER: connector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connector-dev-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector -d connector"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
