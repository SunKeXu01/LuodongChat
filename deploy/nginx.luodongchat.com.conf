server {
    listen 80;
    listen [::]:80;
    server_name luodongchat.com www.luodongchat.com;
    return 301 https://luodongchat.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.luodongchat.com;

    ssl_certificate /etc/nginx/ssl/luodongchat.com.pem;
    ssl_certificate_key /etc/nginx/ssl/luodongchat.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://luodongchat.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name luodongchat.com;

    server_tokens off;
    client_max_body_size 10m;
    ssl_certificate /etc/nginx/ssl/luodongchat.com.pem;
    ssl_certificate_key /etc/nginx/ssl/luodongchat.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
