name: Deploy production

on:
  workflow_run:
    workflows: ["Build and test"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure pinned SSH identity
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Synchronize release files
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='artifacts/' \
            --exclude='**/bin/' \
            --exclude='**/obj/' \
            ./ connector-deploy@8.140.211.162:/app/chatgpt_connector/

      - name: Back up, migrate, and deploy
        run: ssh connector-deploy@8.140.211.162 sudo /usr/bin/env APP_VERSION=${{ github.event.workflow_run.head_sha }} /app/chatgpt_connector/deploy/remote-deploy.sh

      - name: Verify public health
        run: curl --fail --silent --show-error --max-time 15 https://520skx.com/healthz
