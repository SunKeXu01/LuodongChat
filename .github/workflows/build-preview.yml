name: Build and test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway:
    name: Gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build

  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release

  integration:
    name: PostgreSQL and Redis integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: connector_test
          POSTGRES_USER: connector
          POSTGRES_PASSWORD: integration-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U connector -d connector_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
      redis:
        image: public.ecr.aws/docker/library/redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
    env:
      INTEGRATION_DATABASE_URL: postgresql://connector:integration-only@127.0.0.1:5432/connector_test
      INTEGRATION_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  windows-preview:
    name: Windows preview
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Test and publish
        shell: pwsh
        run: |
          $version = (Select-Xml -Path client/ChatGPTConnector.App/ChatGPTConnector.App.csproj -XPath '//Version').Node.InnerText.Trim()
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match project version v$version."
          }
          $asset = "artifacts/ChatGPTConnector-$version-win-x64"
          dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release
          dotnet publish client/ChatGPTConnector.App/ChatGPTConnector.App.csproj --configuration Release --runtime win-x64 --output artifacts/publish
          & artifacts/publish/ChatGPTConnector.exe --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Published Windows executable failed its startup smoke test." }
          Copy-Item artifacts/publish/ChatGPTConnector.exe "$asset.exe"
          (Get-FileHash "$asset.exe" -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content "$asset.exe.sha256"
          Compress-Archive -Path artifacts/publish/* -DestinationPath "$asset.zip"
          (Get-FileHash "$asset.zip" -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content "$asset.zip.sha256"
      - uses: actions/upload-artifact@v6
        with:
          name: ChatGPTConnector-win-x64
          path: |
            artifacts/ChatGPTConnector-*-win-x64.exe
            artifacts/ChatGPTConnector-*-win-x64.exe.sha256
            artifacts/ChatGPTConnector-*-win-x64.zip
            artifacts/ChatGPTConnector-*-win-x64.zip.sha256
          if-no-files-found: error
          retention-days: 14
      - name: Publish GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $files = Get-ChildItem "artifacts/ChatGPTConnector-$version-win-x64.*" | ForEach-Object FullName
          if ($files.Count -ne 4) { throw "Expected four versioned release files, found $($files.Count)." }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
          } else {
            gh release create $tag $files --title "ChatGPT Connector $tag" --prerelease --generate-notes
          }

  android-preview:
    name: Android preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-37.0" "build-tools;36.0.0"
      - name: Build Android debug preview
        run: ./android/gradlew -p android testDebugUnitTest assembleDebug --no-daemon
      - name: Name Android preview artifact
        run: |
          version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts)"
          test -n "$version"
          cp android/app/build/outputs/apk/debug/app-debug.apk "ChatGPTConnector-$version-android-debug.apk"
      - uses: actions/upload-artifact@v6
        with:
          name: ChatGPTConnector-android-preview
          path: ChatGPTConnector-*-android-debug.apk
          if-no-files-found: error
          retention-days: 14

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gateway, core, integration, windows-preview, android-preview]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure pinned SSH identity
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Synchronize release files
        run: |
          rsync -rz --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='artifacts/' \
            --exclude='**/bin/' \
            --exclude='**/obj/' \
            ./ connector-deploy@8.140.211.162:/app/chatgpt_connector/
      - name: Back up, migrate, and deploy
        run: ssh connector-deploy@8.140.211.162 sudo /usr/bin/env APP_VERSION=${{ github.sha }} /app/chatgpt_connector/deploy/remote-deploy.sh
      - name: Verify public health
        run: curl --fail --silent --show-error --max-time 15 https://520skx.com/healthz

  publish-client-update:
    name: Publish client update channel
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows-preview]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ChatGPTConnector-win-x64
          path: release
      - name: Configure pinned SSH identity
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Publish verified executable and update manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          executable="$(find release -type f -name 'ChatGPTConnector-*-win-x64.exe' -print -quit)"
          checksum="$(find release -type f -name 'ChatGPTConnector-*-win-x64.exe.sha256' -print -quit)"
          test -s "$executable"
          test -s "$checksum"
          printf '{"version":"%s","executableUrl":"https://520skx.com/client/download/ChatGPTConnector.exe","checksumUrl":"https://520skx.com/client/download/ChatGPTConnector.exe.sha256"}\n' "${VERSION#v}" > update.json
          rsync -rz "$executable" connector-deploy@8.140.211.162:/app/module/client-releases/ChatGPTConnector.exe.next
          rsync -rz "$checksum" connector-deploy@8.140.211.162:/app/module/client-releases/ChatGPTConnector.exe.sha256.next
          rsync -rz update.json connector-deploy@8.140.211.162:/app/module/client-releases/update.json.next
          ssh connector-deploy@8.140.211.162 'cd /app/module/client-releases && mv ChatGPTConnector.exe.next ChatGPTConnector.exe && mv ChatGPTConnector.exe.sha256.next ChatGPTConnector.exe.sha256 && mv update.json.next update.json'
