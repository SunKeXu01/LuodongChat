name: Build and test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway:
    name: Gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build

  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release

  integration:
    name: PostgreSQL and Redis integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: connector_test
          POSTGRES_USER: connector
          POSTGRES_PASSWORD: integration-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U connector -d connector_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
      redis:
        image: public.ecr.aws/docker/library/redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
    env:
      INTEGRATION_DATABASE_URL: postgresql://connector:integration-only@127.0.0.1:5432/connector_test
      INTEGRATION_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  windows-preview:
    name: Windows preview
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Test and publish
        shell: pwsh
        run: |
          dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release
          dotnet publish client/ChatGPTConnector.App/ChatGPTConnector.App.csproj --configuration Release --runtime win-x64 --output artifacts/publish
          Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.zip
          (Get-FileHash artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.sha256
      - uses: actions/upload-artifact@v6
        with:
          name: ChatGPTConnector-0.1.0-preview.1-win-x64
          path: |
            artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.zip
            artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.sha256
          if-no-files-found: error
          retention-days: 14
      - name: Publish GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = @(
            "artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.zip",
            "artifacts/ChatGPTConnector-0.1.0-preview.1-win-x64.sha256"
          )
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
          } else {
            gh release create $tag $files --title "ChatGPT Connector $tag" --prerelease --generate-notes
          }
