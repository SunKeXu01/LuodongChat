name: Build and test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway:
    name: Gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build

  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release

  integration:
    name: PostgreSQL and Redis integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: connector_test
          POSTGRES_USER: connector
          POSTGRES_PASSWORD: integration-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U connector -d connector_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
      redis:
        image: public.ecr.aws/docker/library/redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
    env:
      INTEGRATION_DATABASE_URL: postgresql://connector:integration-only@127.0.0.1:5432/connector_test
      INTEGRATION_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  windows-preview:
    name: Windows client
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Install NSIS 3.12
        shell: pwsh
        run: choco install nsis --version=3.12 --yes --no-progress
      - name: Verify NSIS script uses UTF-8 BOM
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path 'installer/LuodongChat.nsi'))
          if ($bytes.Length -lt 3 -or $bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
            throw 'installer/LuodongChat.nsi must use UTF-8 with BOM so Chinese text is compiled correctly.'
          }
      - name: Test and publish
        shell: pwsh
        run: |
          $version = (Select-Xml -Path client/ChatGPTConnector.App/ChatGPTConnector.App.csproj -XPath '//Version').Node.InnerText.Trim()
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match project version v$version."
          }
          $asset = "artifacts/LuodongChat-$version-win-x64"
          $versionCore = [Version](($version -split '-')[0])
          $fileVersion = "{0}.{1}.{2}.{3}" -f $versionCore.Major, $versionCore.Minor, [Math]::Max(0, $versionCore.Build), [Math]::Max(0, $versionCore.Revision)
          dotnet test client/ChatGPTConnector.Core.Tests/ChatGPTConnector.Core.Tests.csproj --configuration Release
          dotnet publish client/ChatGPTConnector.App/ChatGPTConnector.App.csproj --configuration Release --runtime win-x64 --output artifacts/publish
          & artifacts/publish/LuodongChat.exe --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Published Windows executable failed its startup smoke test." }
          Copy-Item artifacts/publish/LuodongChat.exe "$asset.exe"
          (Get-FileHash "$asset.exe" -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content "$asset.exe.sha256"
          New-Item -ItemType Directory -Force artifacts/portable/LuodongChat | Out-Null
          Copy-Item artifacts/publish/LuodongChat.exe artifacts/portable/LuodongChat/LuodongChat.exe
          Compress-Archive -Path artifacts/portable/LuodongChat -DestinationPath "$asset-portable.zip"
          (Get-FileHash "$asset-portable.zip" -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content "$asset-portable.zip.sha256"
          $setup = "$asset-setup.exe"
          $makensis = Join-Path ${env:ProgramFiles(x86)} 'NSIS\makensis.exe'
          if (!(Test-Path $makensis)) { $makensis = Join-Path $env:ProgramFiles 'NSIS\makensis.exe' }
          if (!(Test-Path $makensis)) { throw 'NSIS compiler was installed but makensis.exe was not found.' }
          & $makensis "/DVERSION=$version" "/DFILE_VERSION=$fileVersion" "/DSOURCE_EXE=$((Resolve-Path 'artifacts/publish/LuodongChat.exe').Path)" "/DOUTPUT_FILE=$((Resolve-Path 'artifacts').Path)\LuodongChat-$version-win-x64-setup.exe" "/DAPP_ICON=$((Resolve-Path 'client/ChatGPTConnector.App/Assets/AppIcon.ico').Path)" installer/LuodongChat.nsi
          if ($LASTEXITCODE -ne 0 -or !(Test-Path $setup)) { throw "NSIS installer build failed." }
          (Get-FileHash $setup -Algorithm SHA256).Hash.ToLowerInvariant() |
            Set-Content "$setup.sha256"
          # Exercise Unicode and whitespace handling in the exact installer users receive.
          $testRoot = Join-Path $env:RUNNER_TEMP '泺栋chat 安装测试'
          $desktopShortcut = Join-Path ([Environment]::GetFolderPath('Desktop')) '泺栋chat.lnk'
          Remove-Item $desktopShortcut -Force -ErrorAction SilentlyContinue
          $process = Start-Process $setup -ArgumentList @('/S', "/D=$testRoot") -Wait -PassThru
          if ($process.ExitCode -ne 0 -or !(Test-Path "$testRoot/LuodongChat.exe") -or !(Test-Path "$testRoot/Uninstall.exe") -or !(Test-Path $desktopShortcut)) { throw "Unicode-path installer or desktop shortcut smoke test failed." }
          # An in-place update must discover the registered installation path and
          # preserve every user-owned file under data/.
          $userState = "$testRoot/data/update-preservation-test.json"
          '{"keep":true}' | Set-Content $userState -Encoding utf8
          $upgrade = Start-Process $setup -ArgumentList '/S' -Wait -PassThru
          if ($upgrade.ExitCode -ne 0 -or !(Test-Path $userState) -or (Get-Content $userState -Raw) -notmatch '"keep":true') {
            throw "In-place update changed the install directory or deleted user data."
          }
          # The exact silent installer used by automatic updates must launch the
          # newly installed client and leave it running, not merely create a process.
          # Run the installer from a short-lived PowerShell parent, matching the
          # production updater. The client must survive after that parent exits.
          Get-Process LuodongChat -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $escapedSetup = $setup.Replace("'", "''")
          $escapedTestRoot = $testRoot.Replace("'", "''")
          $updateCommand = @"
          `$ErrorActionPreference = 'Stop'
          `$installer = Start-Process -FilePath '$escapedSetup' -ArgumentList @('/S', '/D=$escapedTestRoot') -PassThru
          if (-not `$installer.WaitForExit(60000)) {
            try { `$installer.Kill() } catch { }
            exit 124
          }
          if (`$installer.ExitCode -ne 0) { exit `$installer.ExitCode }
          `$root = '$escapedTestRoot'
          `$target = Join-Path `$root 'LuodongChat.exe'
          `$shellApplication = New-Object -ComObject 'Shell.Application'
          `$shellApplication.ShellExecute(`$target, '--show-after-update', `$root, 'open', 1)
          [void][Runtime.InteropServices.Marshal]::FinalReleaseComObject(`$shellApplication)
          exit 0
          "@
          $encodedCommand = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($updateCommand))
          $updaterParent = Start-Process powershell.exe -ArgumentList @('-NoProfile', '-NonInteractive', '-EncodedCommand', $encodedCommand) -PassThru
          if (!$updaterParent.WaitForExit(60000)) {
            Stop-Process -Id $updaterParent.Id -Force -ErrorAction SilentlyContinue
            throw "Automatic-update parent did not exit."
          }
          if ($updaterParent.ExitCode -ne 0) { throw "Automatic-update installer failed." }
          Start-Sleep -Seconds 5
          $autoStartedClient = Get-Process LuodongChat -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$autoStartedClient -or $autoStartedClient.HasExited) { throw "Automatic update did not leave the client running." }
          Stop-Process -Id $autoStartedClient.Id -Force
          $autoStartedClient.WaitForExit(10000)
          & "$testRoot/LuodongChat.exe" --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Installed executable failed its startup smoke test." }
          # Reproduce the real user case: the close button leaves the WPF client
          # running in the notification area, which keeps LuodongChat.exe locked.
          $runningClient = Start-Process "$testRoot/LuodongChat.exe" -PassThru
          Start-Sleep -Seconds 2
          $runningClient.Refresh()
          if ($runningClient.HasExited) { throw "Installed client exited before the running-app uninstall test." }
          $uninstall = Start-Process "$testRoot/Uninstall.exe" -ArgumentList '/S' -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller smoke test failed." }
          $runningClient.Refresh()
          if (!$runningClient.HasExited) { throw "Uninstaller did not stop the running client." }
          if (Test-Path "$testRoot/LuodongChat.exe") { throw "Uninstaller left LuodongChat.exe behind." }
          if (Test-Path $desktopShortcut) { throw "Uninstaller did not remove the desktop shortcut." }
      - uses: actions/upload-artifact@v6
        with:
          name: LuodongChat-win-x64
          path: |
            artifacts/LuodongChat-*-win-x64.exe
            artifacts/LuodongChat-*-win-x64.exe.sha256
            artifacts/LuodongChat-*-win-x64-setup.exe
            artifacts/LuodongChat-*-win-x64-setup.exe.sha256
            artifacts/LuodongChat-*-win-x64-portable.zip
            artifacts/LuodongChat-*-win-x64-portable.zip.sha256
          if-no-files-found: error
          retention-days: 14
  android-preview:
    name: Android client
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Android SDK platform
        run: |
          sdkmanager="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          test -x "$sdkmanager"
          yes | "$sdkmanager" --licenses >/dev/null || true
          "$sdkmanager" "platforms;android-37.0" "build-tools;36.0.0"
      - name: Build Android debug preview
        run: ./android/gradlew -p android testDebugUnitTest assembleDebug --no-daemon
      - name: Name Android preview artifact
        run: |
          version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts)"
          test -n "$version"
          cp android/app/build/outputs/apk/debug/app-debug.apk "LuodongChat-$version-android-debug.apk"
      - name: Configure Android release signing
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_SIGNING_KEY_BASE64"
          test -n "$ANDROID_SIGNING_STORE_PASSWORD"
          test -n "$ANDROID_SIGNING_KEY_ALIAS"
          test -n "$ANDROID_SIGNING_KEY_PASSWORD"
          printf '%s' "$ANDROID_SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/android-release.jks"
          chmod 600 "$RUNNER_TEMP/android-release.jks"
      - name: Build and verify signed Android release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/android-release.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          ./android/gradlew -p android assembleRelease --no-daemon
          apk="android/app/build/outputs/apk/release/app-release.apk"
          test -s "$apk"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk"
          version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts)"
          output="LuodongChat-$version-android.apk"
          cp "$apk" "$output"
          sha256sum "$output" | awk '{print $1}' > "$output.sha256"
      - uses: actions/upload-artifact@v6
        with:
          name: LuodongChat-android-preview
          path: |
            LuodongChat-*-android-debug.apk
            LuodongChat-*-android.apk
            LuodongChat-*-android.apk.sha256
          if-no-files-found: error
          retention-days: 14

  publish-github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [gateway, core, integration, windows-preview, android-preview]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LuodongChat-win-x64
          path: release/windows
      - uses: actions/download-artifact@v4
        with:
          name: LuodongChat-android-preview
          path: release/android
      - name: Publish synchronized Windows and Android assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          mapfile -t files < <(find release -type f \
            \( -name "LuodongChat-$version-win-x64-setup.exe" \
            -o -name "LuodongChat-$version-win-x64-setup.exe.sha256" \
            -o -name "LuodongChat-$version-win-x64-portable.zip" \
            -o -name "LuodongChat-$version-win-x64-portable.zip.sha256" \
            -o -name "LuodongChat-$version-android.apk" \
            -o -name "LuodongChat-$version-android.apk.sha256" \) \
            -print)
          test "${#files[@]}" -eq 6
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "泺栋chat $tag" --generate-notes
          fi

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gateway, core, integration, windows-preview, android-preview]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure pinned SSH identity
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Synchronize release files
        run: |
          rsync -rz --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='artifacts/' \
            --exclude='**/bin/' \
            --exclude='**/obj/' \
            ./ connector-deploy@8.140.211.162:/app/chatgpt_connector/
      - name: Back up, migrate, and deploy
        run: ssh connector-deploy@8.140.211.162 sudo /usr/bin/env APP_VERSION=${{ github.sha }} /app/chatgpt_connector/deploy/remote-deploy.sh
      - name: Verify public health
        run: curl --fail --silent --show-error --max-time 15 https://520skx.com/healthz

  publish-client-update:
    name: Publish latest client packages to OSS
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows-preview, android-preview]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LuodongChat-win-x64
          path: release/windows
      - uses: actions/download-artifact@v4
        with:
          name: LuodongChat-android-preview
          path: release/android
      - name: Install pinned Alibaba Cloud ossutil
        run: |
          curl --fail --silent --show-error --location \
            https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip \
            --output "$RUNNER_TEMP/ossutil.zip"
          unzip -q "$RUNNER_TEMP/ossutil.zip" -d "$RUNNER_TEMP/ossutil"
          install -m 755 "$RUNNER_TEMP/ossutil/ossutil-2.3.0-linux-amd64/ossutil" "$RUNNER_TEMP/ossutil-bin"
      - name: Configure OSS credentials
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          test -n "$OSS_ACCESS_KEY_ID"
          test -n "$OSS_ACCESS_KEY_SECRET"
          umask 077
          printf '[default]\naccessKeyID=%s\naccessKeySecret=%s\nregion=cn-beijing\nendpoint=https://oss-cn-beijing.aliyuncs.com\n' \
            "$OSS_ACCESS_KEY_ID" "$OSS_ACCESS_KEY_SECRET" > "$RUNNER_TEMP/ossutil.conf"
      - name: Configure pinned SSH identity
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Publish verified latest packages and update manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          executable="$(find release -type f -name 'LuodongChat-*-win-x64.exe' -print -quit)"
          checksum="$(find release -type f -name 'LuodongChat-*-win-x64.exe.sha256' -print -quit)"
          installer="$(find release -type f -name 'LuodongChat-*-win-x64-setup.exe' -print -quit)"
          installer_checksum="$(find release -type f -name 'LuodongChat-*-win-x64-setup.exe.sha256' -print -quit)"
          portable="$(find release -type f -name 'LuodongChat-*-win-x64-portable.zip' -print -quit)"
          portable_checksum="$(find release -type f -name 'LuodongChat-*-win-x64-portable.zip.sha256' -print -quit)"
          android_apk="$(find release/android -type f -name 'LuodongChat-*-android.apk' ! -name '*-debug.apk' -print -quit)"
          android_checksum="$(find release/android -type f -name 'LuodongChat-*-android.apk.sha256' -print -quit)"
          test -s "$executable"
          test -s "$checksum"
          test -s "$installer"
          test -s "$installer_checksum"
          test -s "$portable"
          test -s "$portable_checksum"
          test -s "$android_apk"
          test -s "$android_checksum"
          version="${VERSION#v}"
          base='https://oss.520skx.com/latest'
          github_base="https://github.com/${{ github.repository }}/releases/download/$VERSION"
          printf '{"version":"%s","executableUrl":"%s/LuodongChat-%s-win-x64.exe","checksumUrl":"%s/LuodongChat-%s-win-x64.exe.sha256","installerUrl":"%s/LuodongChat-%s-win-x64-setup.exe","installerChecksumUrl":"%s/LuodongChat-%s-win-x64-setup.exe.sha256","androidApkUrl":"%s/LuodongChat-%s-android.apk","androidChecksumUrl":"%s/LuodongChat-%s-android.apk.sha256"}\n' "$version" "$base" "$version" "$base" "$version" "$base" "$version" "$base" "$version" "$github_base" "$version" "$github_base" "$version" > update.json
          install -d latest
          cp "$executable" latest/LuodongChat.exe
          cp "$checksum" latest/LuodongChat.exe.sha256
          cp "$installer" latest/LuodongChat-Setup.exe
          cp "$installer_checksum" latest/LuodongChat-Setup.exe.sha256
          cp "$portable" latest/LuodongChat-portable.zip
          cp "$portable_checksum" latest/LuodongChat-portable.zip.sha256
          cp "$android_apk" latest/LuodongChat.apk
          cp "$android_checksum" latest/LuodongChat.apk.sha256
          cp "$executable" "latest/LuodongChat-$version-win-x64.exe"
          cp "$checksum" "latest/LuodongChat-$version-win-x64.exe.sha256"
          cp "$installer" "latest/LuodongChat-$version-win-x64-setup.exe"
          cp "$installer_checksum" "latest/LuodongChat-$version-win-x64-setup.exe.sha256"
          cp "$portable" "latest/LuodongChat-$version-win-x64-portable.zip"
          cp "$portable_checksum" "latest/LuodongChat-$version-win-x64-portable.zip.sha256"
          cp "$android_apk" "latest/LuodongChat-$version-android.apk"
          cp "$android_checksum" "latest/LuodongChat-$version-android.apk.sha256"
          cp update.json latest/update.json
          OSSUTIL="$RUNNER_TEMP/ossutil-bin"
          CONFIG="$RUNNER_TEMP/ossutil.conf"
          "$OSSUTIL" rm oss://luodongchat-app/latest/ --recursive --force --config-file "$CONFIG"
          "$OSSUTIL" cp latest/ oss://luodongchat-app/latest/ --recursive --force --acl public-read --cache-control 'public, max-age=300' --config-file "$CONFIG"
          for object in LuodongChat.exe LuodongChat.exe.sha256 LuodongChat-Setup.exe LuodongChat-Setup.exe.sha256 LuodongChat-portable.zip LuodongChat-portable.zip.sha256 LuodongChat.apk LuodongChat.apk.sha256 update.json; do
            "$OSSUTIL" stat "oss://luodongchat-app/latest/$object" --config-file "$CONFIG" >/dev/null
          done
          for object in "LuodongChat-$version-win-x64.exe" "LuodongChat-$version-win-x64.exe.sha256" "LuodongChat-$version-win-x64-setup.exe" "LuodongChat-$version-win-x64-setup.exe.sha256" "LuodongChat-$version-win-x64-portable.zip" "LuodongChat-$version-win-x64-portable.zip.sha256" "LuodongChat-$version-android.apk" "LuodongChat-$version-android.apk.sha256"; do
            "$OSSUTIL" stat "oss://luodongchat-app/latest/$object" --config-file "$CONFIG" >/dev/null
          done
          rsync -rz update.json connector-deploy@8.140.211.162:/app/module/client-releases/update.json.next
          ssh connector-deploy@8.140.211.162 'cd /app/module/client-releases && mv update.json.next update.json && rm -f -- LuodongChat.exe LuodongChat.exe.sha256 LuodongChat-Setup.exe LuodongChat-Setup.exe.sha256 LuodongChat.apk LuodongChat.apk.sha256 ChatGPTConnector.exe ChatGPTConnector.exe.sha256 ChatGPTConnector.apk ChatGPTConnector.apk.sha256'
